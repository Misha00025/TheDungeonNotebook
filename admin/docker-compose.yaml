version: '3'

services:
  admin-panel:
    build: .
    container_name: admin-panel
    networks:
      - backend_backend-network
    ports:
      - "${ADMIN_PORT:-8081}:80"
    env_file:
      - ./.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8080
      - USERS_SERVICE_URL=http://users-service:8080
      - CAMPAIGN_SERVICE_URL=http://campaign-service:8080

networks:
  backend_backend-network:
    external: true
