name: Integration Tests

on:
  push:
    branches: [master]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'
      - 'backend/users-service/**'
      - 'backend/campaign-service/**'
  pull_request:
    branches: [master]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'
      - 'backend/users-service/**'
      - 'backend/campaign-service/**'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: cd backend/api-gateway/tests && bash test-ci.sh -c

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: backend/api-gateway/tests/logs/
