name: Integration Tests

on:
  push:
    branches: [master]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'
      - 'backend/users-service/**'
      - 'backend/campaign-service/**'
  pull_request:
    branches: [master]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/auth-service/**'
      - 'backend/users-service/**'
      - 'backend/campaign-service/**'

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - users-service
          - campaign-service
          - uploads-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build backend/${{ matrix.service }}

  integration-tests:
    needs: [dotnet-build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: cd backend/api-gateway/tests && bash test-ci.sh -c

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: backend/api-gateway/tests/logs/
